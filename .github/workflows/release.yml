name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1

      - name: Run HEMTT check
        run: hemtt check

      - name: Build release
        run: hemtt release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-os-${{ github.ref_name }}
          path: .hemttout/release/
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .hemttout/release/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

  workshop:
    name: Publish to Steam Workshop
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1

      - name: Build release
        run: hemtt release

      - name: Upload to Steam Workshop
        uses: arma-actions/workshop-upload@v1
        with:
          appId: '107410'
          itemId: ${{ vars.STEAM_WORKSHOP_ID }}
          contentPath: .hemttout/release/@ATLAS_OS
          changelog: "Release ${{ github.ref_name }} — see https://github.com/CySpiegel/ATLAS.OS/releases/tag/${{ github.ref_name }}"
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

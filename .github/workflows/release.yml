name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install HEMTT
        run: |
          curl -LSs "https://github.com/BrettMayson/HEMTT/releases/download/v1.18.2/linux-x64" -o hemtt
          chmod +x hemtt
          sudo mv hemtt /usr/local/bin/hemtt

      - name: Restore signing key
        if: env.HEMTT_PRIVATE_KEY != ''
        run: echo "$HEMTT_PRIVATE_KEY" > .hemttprivatekey
        env:
          HEMTT_PRIVATE_KEY: ${{ secrets.HEMTT_PRIVATE_KEY }}

      - name: Build signed release
        run: hemtt release

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp .hemttout/release/keys/*.bikey release-assets/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "ATLAS.OS v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  workshop:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install HEMTT
        run: |
          curl -LSs "https://github.com/BrettMayson/HEMTT/releases/download/v1.18.2/linux-x64" -o hemtt
          chmod +x hemtt
          sudo mv hemtt /usr/local/bin/hemtt

      - name: Build release
        run: hemtt release

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          TAG="${{ github.ref_name }}"
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Steam Workshop
        uses: arma-actions/workshop-upload@v1
        with:
          appId: '107410'
          itemId: ${{ vars.STEAM_WORKSHOP_ID }}
          contentPath: .hemttout/release/
          changelog: ${{ steps.changelog.outputs.notes }}
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}

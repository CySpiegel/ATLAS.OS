name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1

      - name: Run HEMTT check
        run: hemtt check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1

      - name: Build PBOs
        run: hemtt build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: atlas-os-dev-${{ github.sha }}
          path: .hemttout/build/
          retention-days: 14
          if-no-files-found: error

name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HEMTT_VERSION: "1.18.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install HEMTT
        run: |
          curl -LSs "https://github.com/BrettMayson/HEMTT/releases/download/v${HEMTT_VERSION}/linux-x64" -o hemtt
          chmod +x hemtt
          sudo mv hemtt /usr/local/bin/hemtt
          hemtt --version || true

      - name: Build
        run: hemtt build

      - name: Upload build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: atlas-dev-build
          path: .hemttout/build/addons/*.pbo
          retention-days: 14

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install HEMTT
        run: |
          curl -LSs "https://github.com/BrettMayson/HEMTT/releases/download/v${HEMTT_VERSION}/linux-x64" -o hemtt
          chmod +x hemtt
          sudo mv hemtt /usr/local/bin/hemtt

      - name: Check (HEMTT lint)
        run: hemtt check
